<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Synced Lyrics</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Lyrics Sync Preview</h1>

    <form id="search-form">
      <input type="text" id="artist-input" placeholder="Artist" required />
      <input type="text" id="track-input" placeholder="Track title" required />
      <button type="submit">Fetch Lyrics</button>
    </form>

    <div id="controls" class="hidden">
      <button id="play-pause-btn">Play</button>
      <span id="elapsed-time">0:00</span>
    </div>

    <div id="lyrics-container"></div>
  </div>

  <script src="index.js"></script>
</body>
</html>
